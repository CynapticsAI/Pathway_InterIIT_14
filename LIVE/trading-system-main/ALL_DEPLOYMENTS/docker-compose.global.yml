
# =============================================================================
# GLOBAL SERVICES DOCKER COMPOSE
# =============================================================================
# This compose file starts all shared infrastructure and producers:
# - Kafka Cluster (Zookeeper + Kafka)
# - All shared producers (Finnhub, News, Sentiment, Macro, Spike Detector)
#
# Usage:
#   docker compose -f docker-compose.global.yml up -d
#
# After starting this, individual deployments can be started separately.
# =============================================================================

networks:
  global_kafka_network:
    driver: bridge
    name: global_kafka_network

services:
  # ===========================================================================
  # KAFKA CLUSTER
  # ===========================================================================
  
  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    container_name: global-zookeeper
    hostname: zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    ports:
      - "2181:2181"
    networks:
      - global_kafka_network
    healthcheck:
      test: echo srvr | nc localhost 2181 || exit 1
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    restart: unless-stopped
    volumes:
      - zookeeper_data:/var/lib/zookeeper/data
      - zookeeper_logs:/var/lib/zookeeper/log

  kafka:
    image: confluentinc/cp-kafka:7.5.0
    container_name: global-kafka
    hostname: kafka
    depends_on:
      zookeeper:
        condition: service_healthy
    ports:
      - "9090:9090"
      - "29092:29092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: INTERNAL:PLAINTEXT,EXTERNAL:PLAINTEXT
      KAFKA_ADVERTISED_LISTENERS: INTERNAL://kafka:9090,EXTERNAL://13.50.238.243:29092
      KAFKA_LISTENERS: INTERNAL://0.0.0.0:9090,EXTERNAL://0.0.0.0:29092
      KAFKA_INTER_BROKER_LISTENER_NAME: INTERNAL
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
      KAFKA_LOG_RETENTION_HOURS: 168
      KAFKA_NUM_PARTITIONS: 3
    networks:
      - global_kafka_network
    healthcheck:
      test: kafka-broker-api-versions --bootstrap-server localhost:9090 || exit 1
      interval: 10s
      timeout: 10s
      retries: 10
      start_period: 40s
    restart: unless-stopped
    volumes:
      - kafka_data:/var/lib/kafka/data

  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    container_name: kafka-ui
    depends_on:
      kafka:
        condition: service_healthy
    ports:
      - "8090:8080"
    environment:
      KAFKA_CLUSTERS_0_NAME: global-cluster
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:9090
      KAFKA_CLUSTERS_0_ZOOKEEPER: zookeeper:2181
    networks:
      - global_kafka_network
    restart: unless-stopped

  # ===========================================================================
  # SHARED PRODUCERS
  # ===========================================================================

  # Finnhub Stock Data Producer
  # Publishes to: stock_data
  common-finnhub-producer:
    build:
      context: ./shared_producers/common_finnhub_producer
    container_name: common-finnhub-producer
    depends_on:
      kafka:
        condition: service_healthy
    environment:
      - FINNHUB_API_KEY=${FINNHUB_API_KEY}
      - KAFKA_BOOTSTRAP_SERVERS=kafka:9090
      - FINNHUB_SYMBOLS=${FINNHUB_SYMBOLS:-BINANCE:BTCUSDT}
    networks:
      - global_kafka_network
    restart: unless-stopped

  # News Producer
  # Publishes to: news_data
  common-news-producer:
    build:
      context: ./shared_producers/common_news_producer
    container_name: common-news-producer
    depends_on:
      kafka:
        condition: service_healthy
    environment:
      - FINVIZ_API_KEY=${FINVIZ_API_KEY:-}
      - KAFKA_BOOTSTRAP_SERVERS=kafka:9090
      - NEWS_TICKERS=${NEWS_TICKERS:-NVDA,AAPL,TSLA,MSFT}
      - NEWS_POLL_INTERVAL=${NEWS_POLL_INTERVAL:-60}
    networks:
      - global_kafka_network
    restart: unless-stopped

  # Sentiment Producer
  # Publishes to: sentiment_scores
  common-sentiment-producer:
    build:
      context: ./shared_producers/common_sentiment_producer
    container_name: common-sentiment-producer
    depends_on:
      kafka:
        condition: service_healthy
    environment:
      - KAFKA_BOOTSTRAP_SERVERS=kafka:9090
      - SENTIMENT_TICKERS=${SENTIMENT_TICKERS:-TSLA,AAPL,MSFT,NVDA}
      - SENTIMENT_ALPHA=${SENTIMENT_ALPHA:-0.05}
      - SENTIMENT_POLL_INTERVAL=${SENTIMENT_POLL_INTERVAL:-60}
    volumes:
      - sentiment_output:/app/output
    networks:
      - global_kafka_network
    restart: unless-stopped

  # Macro (FRED) Producer
  # Publishes to: fred_economic_data
  common-macro-producer:
    build:
      context: ./shared_producers/common_macro_producer
    container_name: common-macro-producer
    depends_on:
      kafka:
        condition: service_healthy
    environment:
      - FRED_API_KEY=${FRED_API_KEY}
      - KAFKA_BOOTSTRAP_SERVERS=kafka:9090
      - FRED_CSV_PATH=data/fred_stream.csv
      - FRED_FETCH_INTERVAL=${FRED_FETCH_INTERVAL:-3600}
      - FRED_START_DATE=${FRED_START_DATE:-1990-01-01}
    volumes:
      - macro_data:/app/data
    networks:
      - global_kafka_network
    restart: unless-stopped

  # Spike Detector
  # Consumes: stock_data
  # Publishes to: volume_volatility_data
  common-spike-detector:
    build:
      context: ./shared_producers/common_spike_detector
    container_name: common-spike-detector
    depends_on:
      kafka:
        condition: service_healthy
      common-finnhub-producer:
        condition: service_started
    environment:
      - KAFKA_BOOTSTRAP_SERVERS=kafka:9090
      - ROLLING_WINDOW_DURATION=${ROLLING_WINDOW_DURATION:-5m}
      - ROLLING_WINDOW_HOP=${ROLLING_WINDOW_HOP:-10s}
      - MIN_BARS_FOR_STATS=${MIN_BARS_FOR_STATS:-5}
      - SPIKE_THRESHOLD=${SPIKE_THRESHOLD:-3.0}
    volumes:
      - spike_output:/app/output
    networks:
      - global_kafka_network
    restart: unless-stopped

volumes:
  zookeeper_data:
  zookeeper_logs:
  kafka_data:
  sentiment_output:
  macro_data:
  spike_output:
