version: '3.8'

services:
  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    container_name: zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    ports:
      - "2181:2181"
    networks:
      - stock-prediction-network
    healthcheck:
      test: echo srvr | nc localhost 2181 || exit 1
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  kafka:
    image: confluentinc/cp-kafka:7.5.0
    container_name: kafka
    depends_on:
      zookeeper:
        condition: service_healthy
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
    networks:
      - stock-prediction-network
    healthcheck:
      test: kafka-broker-api-versions --bootstrap-server localhost:9092 || exit 1
      interval: 10s
      timeout: 10s
      retries: 10
      start_period: 40s

  producer:
    build:
      context: .
      dockerfile: Dockerfile.producer
    container_name: fred-producer
    depends_on:
      kafka:
        condition: service_healthy
    environment:
      - FRED_API_KEY=${FRED_API_KEY}
      - KAFKA_BOOTSTRAP_SERVERS=kafka:29092  # Add this
    volumes:
      - ./data:/app/data
      - ./models:/app/models
    networks:
      - stock-prediction-network
    restart: unless-stopped

  consumer:
    build:
      context: .
      dockerfile: Dockerfile.consumer
    container_name: model-trainer
    depends_on:
      kafka:
        condition: service_healthy
      producer:
        condition: service_started
    environment:
      - KAFKA_BOOTSTRAP_SERVERS=kafka:29092  # Add this
    volumes:
      - ./models:/app/models
      - ./data:/app/data
    networks:
      - stock-prediction-network
    restart: unless-stopped

  api:
    build:
      context: .
      dockerfile: Dockerfile.api
    container_name: prediction-api
    depends_on:
      consumer:
        condition: service_started
    ports:
      - "8000:8000"
    environment:
      - FRED_API_KEY=${FRED_API_KEY}
    volumes:
      - ./models:/app/models
      - ./data:/app/data
    networks:
      - stock-prediction-network
    restart: unless-stopped

networks:
  stock-prediction-network:
    driver: bridge