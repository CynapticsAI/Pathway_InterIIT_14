services:
  live_rag:
    build:
      context: .
    ports:
      - "${PATHWAY_PORT:-8000}:${PATHWAY_PORT:-8000}"
    environment:
      PATHWAY_PORT: "${PATHWAY_PORT:-8000}"
      PATHWAY_LICENSE_KEY: $PATHWAY_LICENSE_KEY
      GEMINI_API_KEY: $GEMINI_API_KEY
    volumes:
      - ./data:/app/data
      - ./Cache:/app/Cache


