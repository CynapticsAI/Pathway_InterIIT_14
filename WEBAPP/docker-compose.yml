services:
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: pway-stock-frontend
    environment:
      - NODE_ENV=production
      - NEXT_PUBLIC_API_URL=http://backend:8000
      - NEXT_PUBLIC_WS_URL=ws://backend:8000
    depends_on:
      - backend
    networks:
      - pway-network
    restart: unless-stopped

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: pway-stock-backend
    environment:
      - DEBUG=True
      - ALLOWED_HOSTS=*
    volumes:
      - ./backend/logs:/app/logs
      - ./backend/db.sqlite3:/app/db.sqlite3
    networks:
      - pway-network
    restart: unless-stopped

  nginx:
    image: nginx:latest
    container_name: pway-stock-nginx
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - frontend
      - backend
    networks:
      - pway-network
    restart: unless-stopped

networks:
  pway-network:
    driver: bridge
