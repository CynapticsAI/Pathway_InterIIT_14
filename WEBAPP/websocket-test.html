<!DOCTYPE html>
<html>
<head>
    <title>WebSocket Test - AI Chat</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            max-width: 800px;
            margin: 50px auto;
            padding: 20px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        }
        .container {
            background: white;
            border-radius: 10px;
            padding: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
        }
        h2 {
            color: #333;
            margin-top: 0;
        }
        #messages {
            border: 1px solid #ccc;
            height: 400px;
            overflow-y: scroll;
            padding: 15px;
            margin: 20px 0;
            background: #f9f9f9;
            border-radius: 5px;
        }
        .message {
            margin: 10px 0;
            padding: 8px 12px;
            border-radius: 5px;
            max-width: 80%;
        }
        .user-msg {
            background: #667eea;
            color: white;
            margin-left: auto;
            text-align: right;
        }
        .bot-msg {
            background: #e0e0e0;
            color: #333;
        }
        .system-msg {
            background: #fff3cd;
            color: #856404;
            text-align: center;
            margin: 10px auto;
            font-size: 0.9em;
        }
        .input-group {
            display: flex;
            gap: 10px;
        }
        input {
            flex: 1;
            padding: 12px;
            border: 2px solid #ddd;
            border-radius: 5px;
            font-size: 16px;
        }
        button {
            padding: 12px 30px;
            background: #667eea;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-size: 16px;
            font-weight: bold;
        }
        button:hover {
            background: #5568d3;
        }
        button:disabled {
            background: #ccc;
            cursor: not-allowed;
        }
        .status {
            padding: 10px;
            border-radius: 5px;
            margin-bottom: 20px;
            text-align: center;
            font-weight: bold;
        }
        .status.connected {
            background: #d4edda;
            color: #155724;
        }
        .status.disconnected {
            background: #f8d7da;
            color: #721c24;
        }
        .status.connecting {
            background: #fff3cd;
            color: #856404;
        }
    </style>
</head>
<body>
    <div class="container">
        <h2>🤖 WebSocket AI Chat Test</h2>
        
        <div id="status" class="status disconnected">Disconnected</div>
        
        <div id="messages"></div>
        
        <div class="input-group">
            <input type="text" id="messageInput" placeholder="Type a message..." disabled>
            <button id="sendBtn" onclick="sendMessage()" disabled>Send</button>
        </div>
    </div>

    <script>
        const WS_URL = 'wss://dfc78afcdc8c.ngrok-free.app/ws';
        let ws = null;
        const messagesDiv = document.getElementById("messages");
        const messageInput = document.getElementById("messageInput");
        const sendBtn = document.getElementById("sendBtn");
        const statusDiv = document.getElementById("status");

        function updateStatus(status, text) {
            statusDiv.className = `status ${status}`;
            statusDiv.textContent = text;
        }

        function connect() {
            updateStatus('connecting', '🔄 Connecting...');
            ws = new WebSocket(WS_URL);
            
            ws.onopen = () => {
                updateStatus('connected', '✅ Connected to AI');
                addSystemMessage('Connected to AI assistant');
                messageInput.disabled = false;
                sendBtn.disabled = false;
                messageInput.focus();
            };

            ws.onmessage = (event) => {
                const response = event.data;
                addBotMessage(response);
            };

            ws.onclose = () => {
                updateStatus('disconnected', '❌ Disconnected');
                addSystemMessage('Disconnected from AI assistant');
                messageInput.disabled = true;
                sendBtn.disabled = true;
                
                // Auto-reconnect after 3 seconds
                setTimeout(() => {
                    if (ws.readyState === WebSocket.CLOSED) {
                        connect();
                    }
                }, 3000);
            };

            ws.onerror = (error) => {
                console.error("WebSocket error:", error);
                addSystemMessage('Connection error occurred');
            };
        }

        function sendMessage() {
            const message = messageInput.value.trim();
            if (message && ws && ws.readyState === WebSocket.OPEN) {
                ws.send(message);
                addUserMessage(message);
                messageInput.value = "";
                messageInput.focus();
            }
        }

        function addUserMessage(text) {
            const div = document.createElement('div');
            div.className = 'message user-msg';
            div.innerHTML = `<strong>You:</strong> ${escapeHtml(text)}`;
            messagesDiv.appendChild(div);
            scrollToBottom();
        }

        function addBotMessage(text) {
            const div = document.createElement('div');
            div.className = 'message bot-msg';
            div.innerHTML = `<strong>Bot:</strong> ${escapeHtml(text)}`;
            messagesDiv.appendChild(div);
            scrollToBottom();
        }

        function addSystemMessage(text) {
            const div = document.createElement('div');
            div.className = 'message system-msg';
            div.textContent = `[${text}]`;
            messagesDiv.appendChild(div);
            scrollToBottom();
        }

        function scrollToBottom() {
            messagesDiv.scrollTop = messagesDiv.scrollHeight;
        }

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        // Allow sending with Enter key
        messageInput.addEventListener("keyup", (event) => {
            if (event.key === "Enter") {
                sendMessage();
            }
        });

        // Auto-connect on load
        connect();
    </script>
</body>
</html>
