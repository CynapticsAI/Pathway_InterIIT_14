services:
  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000

  kafka:
    image: confluentinc/cp-kafka:7.5.0
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: 'zookeeper:2181'
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT

  finnhub_producer:
    build:
      context: ./finnhub_producer
    depends_on:
      - kafka

  market_breadth:
    build:
      context: ./market_breadth
    depends_on:
      - kafka
      - finnhub_producer
    volumes:
      - ./market_breadth:/app/output
    ports:
      - "8002:8002" 
  spike_detector:
    build:
      context: ./spike_detector
    depends_on:
      - kafka
      - finnhub_producer
    volumes:
      - ./spike_detector:/app/output
    ports:
      - "8001:8001"
    environment:
      BOKEH_DEFAULT_SERVER_HOST : "0.0.0.0" 
  # pnl:
  #   build:
  #     context: ./pnl
  #   depends_on:
  #     - kafka
  #     - finnhub_producer
  #   volumes:
  #     - ./pnl:/app/output
 

  sarimax:
    build:
      context: ./sarimaxConsumer
    depends_on:
      - kafka
      - finnhub_producer
      - news
    volumes:
      - ./sarimaxConsumer:/app/output
    ports:
      - "8007:8007"
 
  news:
    build:
      context: ./news_producer
    volumes:
      - ./news_producer:/app/output
    depends_on:
      - kafka
      
