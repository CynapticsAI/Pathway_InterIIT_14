<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WebSocket Real-Time Data Test</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            max-width: 1400px;
            margin: 0 auto;
            padding: 20px;
            background: #1e1e1e;
            color: #ffffff;
        }
        h1 {
            text-align: center;
            color: #4CAF50;
        }
        .container {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(400px, 1fr));
            gap: 20px;
            margin-top: 20px;
        }
        .stream {
            background: #2d2d2d;
            border-radius: 8px;
            padding: 15px;
            border: 2px solid #444;
        }
        .stream h2 {
            margin-top: 0;
            font-size: 18px;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .status {
            width: 12px;
            height: 12px;
            border-radius: 50%;
            display: inline-block;
        }
        .status.connected {
            background: #4CAF50;
            box-shadow: 0 0 10px #4CAF50;
        }
        .status.disconnected {
            background: #f44336;
        }
        .status.connecting {
            background: #ff9800;
            animation: pulse 1s infinite;
        }
        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }
        .messages {
            background: #1a1a1a;
            border-radius: 4px;
            padding: 10px;
            max-height: 400px;
            overflow-y: auto;
            font-size: 12px;
            font-family: 'Courier New', monospace;
        }
        .message {
            padding: 8px;
            margin: 5px 0;
            border-left: 3px solid #4CAF50;
            background: #2a2a2a;
            border-radius: 2px;
            word-wrap: break-word;
        }
        .timestamp {
            color: #888;
            font-size: 10px;
        }
        button {
            background: #4CAF50;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 4px;
            cursor: pointer;
            margin: 5px;
        }
        button:hover {
            background: #45a049;
        }
        button.disconnect {
            background: #f44336;
        }
        button.disconnect:hover {
            background: #da190b;
        }
        .controls {
            text-align: center;
            margin: 20px 0;
        }
        .stats {
            background: #2d2d2d;
            padding: 10px;
            margin: 10px 0;
            border-radius: 4px;
            font-size: 14px;
        }
    </style>
</head>
<body>
    <h1>🌐 Real-Time WebSocket Data Streams</h1>
    
    <div class="controls">
        <button onclick="connectAll()">Connect All</button>
        <button onclick="disconnectAll()" class="disconnect">Disconnect All</button>
        <button onclick="clearAll()">Clear Messages</button>
    </div>

    <div class="container">
        <!-- Market Breadth -->
        <div class="stream">
            <h2>
                <span class="status connecting" id="status-market-breadth"></span>
                Market Breadth
            </h2>
            <div class="stats" id="stats-market-breadth">Messages: 0</div>
            <div class="messages" id="messages-market-breadth"></div>
        </div>

        <!-- Stock Ticks -->
        <div class="stream">
            <h2>
                <span class="status connecting" id="status-stock-ticks"></span>
                Stock Ticks
            </h2>
            <div class="stats" id="stats-stock-ticks">Messages: 0</div>
            <div class="messages" id="messages-stock-ticks"></div>
        </div>

        <!-- Volume Spikes -->
        <div class="stream">
            <h2>
                <span class="status connecting" id="status-volume-spikes"></span>
                Volume Spikes
            </h2>
            <div class="stats" id="stats-volume-spikes">Messages: 0</div>
            <div class="messages" id="messages-volume-spikes"></div>
        </div>

        <!-- SARIMAX Forecast -->
        <div class="stream">
            <h2>
                <span class="status connecting" id="status-sarimax-forecast"></span>
                SARIMAX Forecast
            </h2>
            <div class="stats" id="stats-sarimax-forecast">Messages: 0</div>
            <div class="messages" id="messages-sarimax-forecast"></div>
        </div>

        <!-- News -->
        <div class="stream">
            <h2>
                <span class="status connecting" id="status-news"></span>
                News Updates
            </h2>
            <div class="stats" id="stats-news">Messages: 0</div>
            <div class="messages" id="messages-news"></div>
        </div>

        <!-- P&L -->
        <div class="stream">
            <h2>
                <span class="status connecting" id="status-pnl"></span>
                P&L Data
            </h2>
            <div class="stats" id="stats-pnl">Messages: 0</div>
            <div class="messages" id="messages-pnl"></div>
        </div>
    </div>

    <script>
        const WS_BASE_URL = 'ws://localhost:8000/ws';
        
        const streams = {
            'market-breadth': {
                ws: null,
                count: 0,
                endpoint: `${WS_BASE_URL}/market-breadth/`
            },
            'stock-ticks': {
                ws: null,
                count: 0,
                endpoint: `${WS_BASE_URL}/stock-ticks/`
            },
            'volume-spikes': {
                ws: null,
                count: 0,
                endpoint: `${WS_BASE_URL}/volume-spikes/`
            },
            'sarimax-forecast': {
                ws: null,
                count: 0,
                endpoint: `${WS_BASE_URL}/sarimax-forecast/`
            },
            'news': {
                ws: null,
                count: 0,
                endpoint: `${WS_BASE_URL}/news/`
            },
            'pnl': {
                ws: null,
                count: 0,
                endpoint: `${WS_BASE_URL}/pnl/`
            }
        };

        function connectStream(name) {
            const stream = streams[name];
            const statusEl = document.getElementById(`status-${name}`);
            const messagesEl = document.getElementById(`messages-${name}`);
            const statsEl = document.getElementById(`stats-${name}`);

            try {
                stream.ws = new WebSocket(stream.endpoint);

                stream.ws.onopen = () => {
                    console.log(`✅ Connected to ${name}`);
                    statusEl.className = 'status connected';
                };

                stream.ws.onmessage = (event) => {
                    stream.count++;
                    const data = JSON.parse(event.data);
                    
                    const messageDiv = document.createElement('div');
                    messageDiv.className = 'message';
                    
                    const timestamp = new Date().toLocaleTimeString();
                    messageDiv.innerHTML = `
                        <div class="timestamp">${timestamp}</div>
                        <pre>${JSON.stringify(data, null, 2)}</pre>
                    `;
                    
                    messagesEl.insertBefore(messageDiv, messagesEl.firstChild);
                    
                    // Keep only last 20 messages
                    while (messagesEl.children.length > 20) {
                        messagesEl.removeChild(messagesEl.lastChild);
                    }
                    
                    statsEl.textContent = `Messages: ${stream.count}`;
                };

                stream.ws.onerror = (error) => {
                    console.error(`❌ Error on ${name}:`, error);
                    statusEl.className = 'status disconnected';
                };

                stream.ws.onclose = () => {
                    console.log(`❌ Disconnected from ${name}`);
                    statusEl.className = 'status disconnected';
                };
            } catch (error) {
                console.error(`Failed to connect to ${name}:`, error);
                statusEl.className = 'status disconnected';
            }
        }

        function disconnectStream(name) {
            const stream = streams[name];
            if (stream.ws) {
                stream.ws.close();
                stream.ws = null;
            }
        }

        function clearMessages(name) {
            document.getElementById(`messages-${name}`).innerHTML = '';
            streams[name].count = 0;
            document.getElementById(`stats-${name}`).textContent = 'Messages: 0';
        }

        function connectAll() {
            Object.keys(streams).forEach(connectStream);
        }

        function disconnectAll() {
            Object.keys(streams).forEach(disconnectStream);
        }

        function clearAll() {
            Object.keys(streams).forEach(clearMessages);
        }

        // Auto-connect on page load
        window.addEventListener('load', () => {
            console.log('🚀 Auto-connecting to all streams...');
            connectAll();
        });

        // Cleanup on page unload
        window.addEventListener('beforeunload', disconnectAll);
    </script>
</body>
</html>
