<!DOCTYPE html>
<html lang="en" xmlns:v="urn:schemas-microsoft-com:vml" xmlns:o="urn:schemas-microsoft-com:office:office">
<head>
  <meta charset="utf-8">
  <meta name="x-apple-disable-message-reformatting">
  <meta http-equiv="x-ua-compatible" content="ie=edge">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="format-detection" content="telephone=no, date=no, address=no, email=no">
  <title>{% block title %}Notification{% endblock %} - Pway Stock</title>
  <!--[if mso]>
  <xml><o:OfficeDocumentSettings><o:PixelsPerInch>96</o:PixelsPerInch></o:OfficeDocumentSettings></xml>
  <style>
    td,th,div,p,a,h1,h2,h3,h4,h5,h6 {font-family: "Segoe UI", sans-serif; mso-line-height-rule: exactly;}
  </style>
  <![endif]-->
  <style>
    /* Slate Minimal Theme Colors */
    :root {
      --primary: #475569;
      --primary-hover: #334155;
      --accent: #64748B;
      --success: #10B981;
      --danger: #EF4444;
      --warning: #F59E0B;
      --info: #3B82F6;
      --bg-light: #F8FAFC;
      --bg-card: #FFFFFF;
      --border: #E2E8F0;
      --text-primary: #1E293B;
      --text-secondary: #64748B;
      --text-muted: #94A3B8;
    }
    
    /* Reset */
    body, table, td, a {
      -webkit-text-size-adjust: 100%;
      -ms-text-size-adjust: 100%;
    }
    table, td {
      mso-table-lspace: 0pt;
      mso-table-rspace: 0pt;
    }
    img {
      -ms-interpolation-mode: bicubic;
      border: 0;
      height: auto;
      line-height: 100%;
      outline: none;
      text-decoration: none;
    }
    
    /* Base styles */
    body {
      margin: 0;
      padding: 0;
      width: 100% !important;
      height: 100% !important;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
      background-color: #F8FAFC;
    }
    
    /* Typography */
    h1, h2, h3, h4, h5, h6 {
      margin: 0;
      padding: 0;
      font-weight: 600;
      color: #1E293B;
      line-height: 1.3;
    }
    h1 { font-size: 28px; }
    h2 { font-size: 24px; }
    h3 { font-size: 20px; }
    p {
      margin: 0;
      padding: 0;
      color: #475569;
      line-height: 1.6;
    }
    
    /* Container */
    .container {
      max-width: 600px;
      margin: 0 auto;
    }
    
    /* Card */
    .card {
      background-color: #FFFFFF;
      border-radius: 12px;
      box-shadow: 0 1px 3px 0 rgba(0, 0, 0, 0.1), 0 1px 2px 0 rgba(0, 0, 0, 0.06);
      overflow: hidden;
    }
    
    /* Header */
    .header {
      background: linear-gradient(135deg, #475569 0%, #334155 100%);
      padding: 32px 24px;
      text-align: center;
    }
    .header h1 {
      color: #FFFFFF;
      font-size: 24px;
      font-weight: 700;
      margin-bottom: 4px;
    }
    .header p {
      color: #CBD5E1;
      font-size: 14px;
      margin: 0;
    }
    
    /* Content */
    .content {
      padding: 32px 24px;
    }
    
    /* Badge */
    .badge {
      display: inline-block;
      padding: 6px 12px;
      border-radius: 6px;
      font-size: 12px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }
    .badge-news {
      background-color: #DBEAFE;
      color: #1E40AF;
    }
    .badge-volume {
      background-color: #FEF3C7;
      color: #92400E;
    }
    .badge-high {
      background-color: #FEE2E2;
      color: #991B1B;
    }
    .badge-medium {
      background-color: #FEF3C7;
      color: #92400E;
    }
    .badge-low {
      background-color: #E0E7FF;
      color: #3730A3;
    }
    
    /* Stock Symbol */
    .stock-symbol {
      display: inline-flex;
      align-items: center;
      padding: 8px 16px;
      background-color: #F1F5F9;
      border-radius: 8px;
      font-size: 18px;
      font-weight: 700;
      color: #334155;
      letter-spacing: 0.5px;
      margin: 16px 0;
    }
    
    /* Info Box */
    .info-box {
      background-color: #F8FAFC;
      border-left: 4px solid #475569;
      padding: 16px;
      border-radius: 8px;
      margin: 20px 0;
    }
    .info-box h3 {
      font-size: 16px;
      margin-bottom: 8px;
      color: #334155;
    }
    .info-box p {
      font-size: 14px;
      color: #64748B;
      line-height: 1.6;
    }
    
    /* Data Row */
    .data-row {
      display: flex;
      justify-content: space-between;
      padding: 12px 0;
      border-bottom: 1px solid #E2E8F0;
    }
    .data-row:last-child {
      border-bottom: none;
    }
    .data-label {
      font-size: 14px;
      color: #64748B;
      font-weight: 500;
    }
    .data-value {
      font-size: 14px;
      color: #1E293B;
      font-weight: 600;
    }
    
    /* Button */
    .button {
      display: inline-block;
      padding: 14px 28px;
      background: linear-gradient(135deg, #475569 0%, #334155 100%);
      color: #FFFFFF !important;
      text-decoration: none;
      border-radius: 8px;
      font-weight: 600;
      font-size: 15px;
      text-align: center;
      transition: all 0.3s ease;
      box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);
    }
    .button:hover {
      background: linear-gradient(135deg, #334155 0%, #1E293B 100%);
      box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1), 0 4px 6px -2px rgba(0, 0, 0, 0.05);
    }
    
    /* Footer */
    .footer {
      padding: 24px;
      text-align: center;
      background-color: #F8FAFC;
      border-top: 1px solid #E2E8F0;
    }
    .footer p {
      font-size: 13px;
      color: #94A3B8;
      margin: 8px 0;
    }
    .footer a {
      color: #475569;
      text-decoration: none;
      font-weight: 500;
    }
    
    /* Timestamp */
    .timestamp {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      padding: 12px;
      background-color: #F8FAFC;
      border-radius: 8px;
      margin: 20px 0;
    }
    .timestamp-icon {
      font-size: 16px;
    }
    .timestamp-text {
      font-size: 13px;
      color: #64748B;
    }
    
    /* Responsive */
    @media only screen and (max-width: 600px) {
      .container {
        width: 100% !important;
      }
      .content {
        padding: 24px 20px !important;
      }
      .header {
        padding: 24px 20px !important;
      }
      h1 { font-size: 24px !important; }
      h2 { font-size: 20px !important; }
      .button {
        display: block !important;
        width: 100% !important;
        padding: 16px !important;
      }
    }
    
    /* Sentiment Colors */
    .sentiment-positive {
      color: #10B981;
      font-weight: 600;
    }
    .sentiment-negative {
      color: #EF4444;
      font-weight: 600;
    }
    .sentiment-neutral {
      color: #64748B;
      font-weight: 600;
    }
    
    /* Price Change */
    .price-up {
      color: #10B981;
      font-weight: 700;
    }
    .price-down {
      color: #EF4444;
      font-weight: 700;
    }
    
    /* Stats Grid */
    .stats-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 16px;
      margin: 20px 0;
    }
    .stat-card {
      background-color: #F8FAFC;
      padding: 16px;
      border-radius: 8px;
      text-align: center;
    }
    .stat-value {
      font-size: 24px;
      font-weight: 700;
      color: #1E293B;
      margin-bottom: 4px;
    }
    .stat-label {
      font-size: 12px;
      color: #64748B;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }
  </style>
</head>
<body>
  <table role="presentation" border="0" cellpadding="0" cellspacing="0" width="100%">
    <tr>
      <td align="center" style="padding: 40px 20px;">
        <table role="presentation" border="0" cellpadding="0" cellspacing="0" class="container" width="600">
          <!-- Card -->
          <tr>
            <td class="card">
              <!-- Header -->
              <table role="presentation" border="0" cellpadding="0" cellspacing="0" width="100%">
                <tr>
                  <td class="header">
                    <h1>{% block header_title %}🔔 Notification{% endblock %}</h1>
                    <p>{% block header_subtitle %}Pway Stock Alert{% endblock %}</p>
                  </td>
                </tr>
              </table>
              
              <!-- Content -->
              <table role="presentation" border="0" cellpadding="0" cellspacing="0" width="100%">
                <tr>
                  <td class="content">
                    {% block content %}{% endblock %}
                  </td>
                </tr>
              </table>
              
              <!-- Footer -->
              <table role="presentation" border="0" cellpadding="0" cellspacing="0" width="100%">
                <tr>
                  <td class="footer">
                    <p style="margin-bottom: 12px;">
                      <a href="{{ app_url }}" style="color: #475569; text-decoration: none; font-weight: 600;">View Dashboard</a>
                    </p>
                    <p style="color: #94A3B8; font-size: 12px;">
                      You're receiving this email because you have {{ symbol }} in your portfolio.
                    </p>
                    <p style="color: #CBD5E1; font-size: 11px; margin-top: 16px;">
                      © {{ year }} Pway Stock. All rights reserved.
                    </p>
                  </td>
                </tr>
              </table>
            </td>
          </tr>
        </table>
      </td>
    </tr>
  </table>
</body>
</html>
