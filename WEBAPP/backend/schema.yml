openapi: 3.0.3
info:
  title: Pway Stock API
  version: 1.0.0
  description: Stock Analysis Chatbot API with user authentication, chat conversations,
    and real-time stock data
paths:
  /api/auth/change-password/:
    post:
      operationId: auth_change_password_create
      description: "\n    Change password for the authenticated user.\n    \n    **Required:**\n
        \   - Current password (for verification)\n    - New password\n    - New password
        confirmation\n    \n    **Security:**\n    Password must meet strength requirements
        (min length, special characters, etc.)\n    "
      summary: Change password
      tags:
      - Authentication
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ChangePasswordRequest'
            examples:
              ChangePassword:
                value:
                  old_password: OldPass123!
                  new_password: NewSecurePass123!
                  new_password2: NewSecurePass123!
                summary: Change Password
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/ChangePasswordRequest'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/ChangePasswordRequest'
        required: true
      security:
      - jwtAuth: []
      - cookieAuth: []
      - bearerAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
          description: ''
        '400':
          content:
            application/json:
              schema:
                type: object
                additionalProperties: {}
          description: ''
  /api/auth/forgot-password/:
    post:
      operationId: auth_forgot_password_create
      description: "\n    Request a password reset link to be sent via email.\n    \n
        \   **Process:**\n    1. User provides their email address\n    2. System
        validates email exists\n    3. Password reset token is generated\n    4. Email
        with reset link is sent\n    \n    **Token Validity:** 1 hour\n    \n    **Security
        Note:** For security, the API always returns success even if email doesn't
        exist.\n    "
      summary: Request password reset
      tags:
      - Authentication
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PasswordResetRequestRequest'
            examples:
              RequestReset:
                value:
                  email: john@example.com
                summary: Request Reset
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/PasswordResetRequestRequest'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/PasswordResetRequestRequest'
        required: true
      security:
      - jwtAuth: []
      - cookieAuth: []
      - bearerAuth: []
      - {}
      responses:
        '200':
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
          description: ''
  /api/auth/login/:
    post:
      operationId: auth_login_create
      description: "\n    Authenticate user and receive JWT access and refresh tokens.\n
        \   \n    **Authentication Flow:**\n    1. User provides email and password\n
        \   2. System validates credentials\n    3. JWT tokens are generated (access
        + refresh)\n    4. User session is created and tracked\n    5. Activity is
        logged\n    \n    **Token Usage:**\n    - **Access Token**: Use for authenticated
        API requests (expires in 1 hour)\n    - **Refresh Token**: Use to get new
        access token (expires in 7 days)\n    \n    **Next Steps:**\n    - Store tokens
        securely (httpOnly cookies recommended)\n    - Include access token in Authorization
        header: `Bearer <access_token>`\n    - Use refresh token when access token
        expires\n    "
      summary: Login with email and password
      tags:
      - Authentication
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UserLoginRequest'
            examples:
              LoginRequest:
                value:
                  email: john@example.com
                  password: SecurePass123!
                summary: Login Request
                description: Login with email and password
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/UserLoginRequest'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/UserLoginRequest'
        required: true
      security:
      - jwtAuth: []
      - cookieAuth: []
      - bearerAuth: []
      - {}
      responses:
        '200':
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                  tokens:
                    type: object
                    properties:
                      access:
                        type: string
                      refresh:
                        type: string
                  user:
                    type: object
              examples:
                SuccessResponse:
                  value:
                    message: Login successful
                    tokens:
                      access: eyJ0eXAiOiJKV1QiLCJhbGc...
                      refresh: eyJ0eXAiOiJKV1QiLCJhbGc...
                    user:
                      id: 1
                      username: john_doe
                      email: john@example.com
                      email_verified: true
                  summary: Success Response
                  description: Login successful with JWT tokens
          description: ''
        '400':
          content:
            application/json:
              schema:
                type: object
                additionalProperties: {}
          description: ''
  /api/auth/logout/:
    post:
      operationId: auth_logout_create
      description: "\n    Logout the authenticated user and invalidate all active
        sessions.\n    \n    **Actions Performed:**\n    - Deactivates all active
        user sessions\n    - Logs the logout activity\n    - Clears Django session\n
        \   \n    **Security Note:**\n    This invalidates all sessions, including
        other devices. Users will need to login again on all devices.\n    "
      summary: Logout current user
      tags:
      - Authentication
      security:
      - jwtAuth: []
      - cookieAuth: []
      - bearerAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: Logout successful
              examples:
                SuccessResponse:
                  value:
                    message: Logout successful
                  summary: Success Response
          description: ''
        '401':
          content:
            application/json:
              schema:
                type: object
                additionalProperties: {}
          description: ''
  /api/auth/refresh/:
    post:
      operationId: auth_refresh_create
      description: |-
        Takes a refresh type JSON web token and returns an access type JSON web
        token if the refresh token is valid.
      tags:
      - auth
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TokenRefreshRequest'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/TokenRefreshRequest'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/TokenRefreshRequest'
        required: true
      security:
      - bearerAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TokenRefresh'
          description: ''
  /api/auth/register/:
    post:
      operationId: auth_register_create
      description: "\n    Register a new user account with email and password.\n    \n
        \   **Process:**\n    1. User provides username, email, and password\n    2.
        System validates the data (unique email, password strength)\n    3. User account
        is created (email not verified yet)\n    4. Email verification token is generated\n
        \   5. Verification email is sent\n    \n    **Next Steps:**\n    - Check
        email for verification link\n    - Verify email using the token\n    - Login
        to get JWT tokens\n    "
      summary: Register a new user
      tags:
      - Authentication
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UserRegistrationRequest'
            examples:
              RegistrationExample:
                value:
                  username: john_doe
                  email: john@example.com
                  password: SecurePass123!
                  password2: SecurePass123!
                  first_name: John
                  last_name: Doe
                summary: Registration Example
                description: Example request to register a new user
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/UserRegistrationRequest'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/UserRegistrationRequest'
        required: true
      security:
      - jwtAuth: []
      - cookieAuth: []
      - bearerAuth: []
      - {}
      responses:
        '201':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CustomUser'
              examples:
                SuccessResponse:
                  value:
                    message: User registered successfully. Please check your email
                      to verify your account.
                    user:
                      id: 1
                      username: john_doe
                      email: john@example.com
                      first_name: John
                      last_name: Doe
                      email_verified: false
                  summary: Success Response
                  description: Successful registration response
          description: ''
        '400':
          content:
            application/json:
              schema:
                type: object
                additionalProperties: {}
          description: ''
  /api/auth/reset-password/:
    post:
      operationId: auth_reset_password_create
      description: "\n    Reset password using the token received via email.\n    \n
        \   **Process:**\n    1. User receives reset token via email\n    2. User
        provides token and new password\n    3. System validates token (not expired,
        not used)\n    4. Password is updated\n    5. All active sessions are invalidated\n
        \   \n    **Security:**\n    - Token is single-use only\n    - Token expires
        after 1 hour\n    - All sessions are logged out after reset\n    "
      summary: Reset password with token
      tags:
      - Authentication
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PasswordResetConfirmRequest'
            examples:
              ResetPassword:
                value:
                  token: abc123def456...
                  new_password: NewSecurePass123!
                  new_password2: NewSecurePass123!
                summary: Reset Password
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/PasswordResetConfirmRequest'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/PasswordResetConfirmRequest'
        required: true
      security:
      - jwtAuth: []
      - cookieAuth: []
      - bearerAuth: []
      - {}
      responses:
        '200':
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
          description: ''
        '400':
          content:
            application/json:
              schema:
                type: object
                additionalProperties: {}
          description: ''
  /api/auth/verify-email/:
    post:
      operationId: auth_verify_email_create
      description: "\n    Verify user's email address using the token sent via email.\n
        \   \n    **Process:**\n    1. User receives verification email after registration\n
        \   2. Email contains a unique token\n    3. User clicks link or provides
        token to this endpoint\n    4. System verifies token and marks email as verified\n
        \   \n    **Token Validity:** 24 hours\n    "
      summary: Verify email address
      tags:
      - Authentication
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/EmailVerificationRequest'
            examples:
              VerifyEmail:
                value:
                  token: abc123def456...
                summary: Verify Email
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/EmailVerificationRequest'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/EmailVerificationRequest'
        required: true
      security:
      - jwtAuth: []
      - cookieAuth: []
      - bearerAuth: []
      - {}
      responses:
        '200':
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
              examples:
                Success:
                  value:
                    message: Email verified successfully
          description: ''
        '400':
          content:
            application/json:
              schema:
                type: object
                additionalProperties: {}
          description: ''
  /api/chat/conversations/:
    get:
      operationId: chat_conversations_list
      description: Get all chat conversations for the authenticated user, ordered
        by most recent
      summary: List all conversations
      parameters:
      - name: page
        required: false
        in: query
        description: A page number within the paginated result set.
        schema:
          type: integer
      tags:
      - Chat
      security:
      - jwtAuth: []
      - cookieAuth: []
      - bearerAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaginatedChatConversationList'
          description: ''
    post:
      operationId: chat_conversations_create
      description: Create a new chat conversation
      summary: Create new conversation
      tags:
      - Chat
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ChatConversationRequest'
            examples:
              CreateConversation:
                value:
                  title: AAPL Stock Analysis
                  tags:
                  - stocks
                  - tech
                  - analysis
                summary: Create Conversation
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/ChatConversationRequest'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/ChatConversationRequest'
      security:
      - jwtAuth: []
      - cookieAuth: []
      - bearerAuth: []
      responses:
        '201':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ChatConversation'
          description: ''
  /api/chat/conversations/{conversation_id}/messages/:
    get:
      operationId: chat_conversations_messages_list
      description: "\n    Retrieve all messages in a specific conversation.\n    \n
        \   Messages are ordered chronologically (oldest first).\n    Includes both
        user and assistant messages.\n    "
      summary: List messages in a conversation
      parameters:
      - in: path
        name: conversation_id
        schema:
          type: integer
        description: ID of the conversation
        required: true
      - name: page
        required: false
        in: query
        description: A page number within the paginated result set.
        schema:
          type: integer
      tags:
      - Chat
      security:
      - jwtAuth: []
      - cookieAuth: []
      - bearerAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaginatedChatMessageList'
          description: ''
  /api/chat/conversations/{conversation_id}/messages/create/:
    post:
      operationId: chat_conversations_messages_create_create
      description: "\n    Send a new message in a conversation and get chatbot response.\n
        \   \n    **Process:**\n    1. User sends a message\n    2. Message is saved
        to conversation\n    3. Chatbot processes the message (integration pending)\n
        \   4. Assistant response is saved\n    5. Conversation is updated\n    6.
        User's query count is incremented\n    \n    **Usage Tracking:**\n    - Increments
        total_queries and queries_this_month\n    - Updates last_query_at timestamp\n
        \   - Logs activity for analytics\n    \n    **Note:** Chatbot integration
        is pending. Currently saves user message only.\n    "
      summary: Send a message in a conversation
      parameters:
      - in: path
        name: conversation_id
        schema:
          type: integer
        description: ID of the conversation
        required: true
      tags:
      - Chat
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ChatMessageCreateRequest'
            examples:
              SendMessage:
                value:
                  content: What is the current price of AAPL stock?
                summary: Send Message
                description: Ask about a stock
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/ChatMessageCreateRequest'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/ChatMessageCreateRequest'
        required: true
      security:
      - jwtAuth: []
      - cookieAuth: []
      - bearerAuth: []
      responses:
        '201':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ChatMessage'
              examples:
                SuccessResponse:
                  value:
                    message:
                      id: 1
                      content: What is the current price of AAPL stock?
                      message_type: user
                      created_at: '2025-11-10T12:00:00Z'
                    note: Chatbot integration pending
                  summary: Success Response
          description: ''
        '404':
          content:
            application/json:
              schema:
                type: object
                additionalProperties: {}
          description: ''
  /api/chat/conversations/{id}/:
    get:
      operationId: chat_conversations_retrieve
      description: "\n    Manage a specific chat conversation.\n    \n    **Operations:**\n
        \   - **GET**: Retrieve conversation details\n    - **PUT/PATCH**: Update
        conversation (title, tags, archived status)\n    - **DELETE**: Delete conversation
        and all its messages\n    "
      summary: Get, update, or delete a conversation
      parameters:
      - in: path
        name: id
        schema:
          type: integer
        required: true
      tags:
      - Chat
      security:
      - jwtAuth: []
      - cookieAuth: []
      - bearerAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ChatConversation'
          description: ''
    put:
      operationId: chat_conversations_update
      description: "\n    Manage a specific chat conversation.\n    \n    **Operations:**\n
        \   - **GET**: Retrieve conversation details\n    - **PUT/PATCH**: Update
        conversation (title, tags, archived status)\n    - **DELETE**: Delete conversation
        and all its messages\n    "
      summary: Get, update, or delete a conversation
      parameters:
      - in: path
        name: id
        schema:
          type: integer
        required: true
      tags:
      - Chat
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ChatConversationRequest'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/ChatConversationRequest'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/ChatConversationRequest'
      security:
      - jwtAuth: []
      - cookieAuth: []
      - bearerAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ChatConversation'
          description: ''
    patch:
      operationId: chat_conversations_partial_update
      description: "\n    Manage a specific chat conversation.\n    \n    **Operations:**\n
        \   - **GET**: Retrieve conversation details\n    - **PUT/PATCH**: Update
        conversation (title, tags, archived status)\n    - **DELETE**: Delete conversation
        and all its messages\n    "
      summary: Get, update, or delete a conversation
      parameters:
      - in: path
        name: id
        schema:
          type: integer
        required: true
      tags:
      - Chat
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PatchedChatConversationRequest'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/PatchedChatConversationRequest'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/PatchedChatConversationRequest'
      security:
      - jwtAuth: []
      - cookieAuth: []
      - bearerAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ChatConversation'
          description: ''
    delete:
      operationId: chat_conversations_destroy
      description: "\n    Manage a specific chat conversation.\n    \n    **Operations:**\n
        \   - **GET**: Retrieve conversation details\n    - **PUT/PATCH**: Update
        conversation (title, tags, archived status)\n    - **DELETE**: Delete conversation
        and all its messages\n    "
      summary: Get, update, or delete a conversation
      parameters:
      - in: path
        name: id
        schema:
          type: integer
        required: true
      tags:
      - Chat
      security:
      - jwtAuth: []
      - cookieAuth: []
      - bearerAuth: []
      responses:
        '204':
          description: No response body
  /api/chatbot/:
    get:
      operationId: chatbot_retrieve
      description: "\n    Development endpoint for testing the chatbot API integration.\n
        \   \n    **GET**: Returns instructions\n    **POST**: Send a message to the
        chatbot and get response\n    \n    **Note:** This is a test endpoint. For
        production, use the chat conversations API.\n    "
      summary: Test chatbot integration
      tags:
      - Chatbot
      security:
      - jwtAuth: []
      - cookieAuth: []
      - bearerAuth: []
      - {}
      responses:
        '200':
          content:
            application/json:
              schema:
                type: object
                additionalProperties: {}
          description: ''
    post:
      operationId: chatbot_create
      description: "\n    Development endpoint for testing the chatbot API integration.\n
        \   \n    **GET**: Returns instructions\n    **POST**: Send a message to the
        chatbot and get response\n    \n    **Note:** This is a test endpoint. For
        production, use the chat conversations API.\n    "
      summary: Test chatbot integration
      tags:
      - Chatbot
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ChatbotMessageRequest'
            examples:
              TestMessage:
                value:
                  message: What is the price of AAPL?
                summary: Test Message
                description: Send a test message to the chatbot
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/ChatbotMessageRequest'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/ChatbotMessageRequest'
        required: true
      security:
      - jwtAuth: []
      - cookieAuth: []
      - bearerAuth: []
      - {}
      responses:
        '200':
          content:
            application/json:
              schema:
                type: object
                additionalProperties: {}
          description: ''
  /api/news/:
    get:
      operationId: news_list
      description: Fetch historical news data
      summary: Get historical news data
      parameters:
      - in: query
        name: limit
        schema:
          type: integer
        description: 'Number of records to return (default: 50, max: 200)'
      tags:
      - Stock Data
      security:
      - jwtAuth: []
      - cookieAuth: []
      - bearerAuth: []
      - {}
      responses:
        '200':
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/NewsData'
          description: ''
  /api/notification-preferences/:
    get:
      operationId: notification_preferences_list
      description: |-
        ViewSet for managing notification preferences

        Provides endpoints for:
        - Getting user notification preferences
        - Updating notification preferences
      parameters:
      - name: page
        required: false
        in: query
        description: A page number within the paginated result set.
        schema:
          type: integer
      tags:
      - Notifications
      security:
      - jwtAuth: []
      - cookieAuth: []
      - bearerAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaginatedNotificationPreferenceList'
          description: ''
  /api/notification-preferences/{id}/:
    get:
      operationId: notification_preferences_retrieve
      description: Get notification preferences for the authenticated user
      summary: Get notification preferences
      parameters:
      - in: path
        name: id
        schema:
          type: string
        required: true
      tags:
      - Notifications
      security:
      - jwtAuth: []
      - cookieAuth: []
      - bearerAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/NotificationPreference'
          description: ''
    put:
      operationId: notification_preferences_update
      description: Update notification preferences for the authenticated user
      summary: Update notification preferences
      parameters:
      - in: path
        name: id
        schema:
          type: string
        required: true
      tags:
      - Notifications
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/NotificationPreferenceRequest'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/NotificationPreferenceRequest'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/NotificationPreferenceRequest'
      security:
      - jwtAuth: []
      - cookieAuth: []
      - bearerAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/NotificationPreference'
          description: ''
    patch:
      operationId: notification_preferences_partial_update
      description: |-
        ViewSet for managing notification preferences

        Provides endpoints for:
        - Getting user notification preferences
        - Updating notification preferences
      parameters:
      - in: path
        name: id
        schema:
          type: string
        required: true
      tags:
      - Notifications
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PatchedNotificationPreferenceRequest'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/PatchedNotificationPreferenceRequest'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/PatchedNotificationPreferenceRequest'
      security:
      - jwtAuth: []
      - cookieAuth: []
