components:
  schemas:
    BulkStockUploadRequest:
      type: object
      description: |-
        Serializer for bulk CSV upload
        Expects array of stocks with symbol, quantity, cost_basis
      properties:
        stocks:
          type: array
          items:
            type: object
            additionalProperties: {}
      required:
      - stocks
    ChangePasswordRequest:
      type: object
      description: Serializer for password change
      properties:
        old_password:
          type: string
          writeOnly: true
          minLength: 1
        new_password:
          type: string
          writeOnly: true
          minLength: 1
        new_password2:
          type: string
          writeOnly: true
          minLength: 1
          title: Confirm New Password
      required:
      - new_password
      - new_password2
      - old_password
    ChatConversation:
      type: object
      description: Serializer for ChatConversation
      properties:
        id:
          type: integer
          readOnly: true
        title:
          type: string
          maxLength: 255
        is_archived:
          type: boolean
        is_pinned:
          type: boolean
        tags: {}
        message_count:
          type: integer
          readOnly: true
        created_at:
          type: string
          format: date-time
          readOnly: true
        updated_at:
          type: string
          format: date-time
          readOnly: true
        last_message_at:
          type: string
          format: date-time
          readOnly: true
      required:
